<!DOCTYPE html>
<html>
<head>
    <title>Margins Example</title>

    <style>
        div#d1 {
            background-color: red;
            margin: 0px;
        }

        div#d2 {
            background-color: green;
            margin: 5px 0px 0px 15px;
        }

        div#d3 {
            background-color: blue;
            margin: 0px 0px 0px 75px;
        }

        div#d4 {
            background-color: yellow;
            margin: 25px 0px 0px 250px;
        }
    </style>
</head>

<body>
    <div id="d1">DIV #1</div>
    <div id="d2">DIV #2</div>
    <div id="d3">DIV #3</div>
    <div id="d4">DIV #4</div>
</body>
</html>
