<!DOCTYPE html>
<html>
<head>
    <title>Color Blocks</title>
    <style>
        body {
            margin: 0px;
        }

        div {
            width: 250px;
            height: 100px;
            color: black;
            font-weight: bold;
            margin: 25px;
            border: 5px solid #000000;
            box-sizing: border-box;
        }

        #d1 {
            text-align: center;
            padding: 15px;
            background-color: red;
        }

        #d2 {
            text-align: right;
            background-color: green;
            padding: 25px 50px 6px 6px;
        }

        #d3 {
            text-align: left;
            background-color: blue;
            padding: 6px 6px 6px 50px;
        }

        #d4 {
            background-color: yellow;
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div id="d1">DIV #1</div>
    <div id="d2">DIV #2</div>
    <div id="d3">DIV #3</div>
    <div id="d4">DIV #4</div>

</body>
</html>
