<!DOCTYPE html>
<html>
<head>
    <title>Color Blocks</title>
    <style>
        div {
            width: 250px;
            height: 100px;
            border: 5px solid #000000;
            color: black;
            font-weight: bold;
            text-align: center;
            line-height: 100px;
            box-sizing: border-box;
        }

        #d1 {
            background-color: red;
            margin: 0px;
        }

        #d2 {
            background-color: green;
            margin: 5px 0px 0px 15px;
        }

        #d3 {
            background-color: blue;
            margin: 0px 0px 0px 75px;
        }

        #d4 {
            background-color: yellow;
            margin: 25px 0px 0px 250px;
        }
    </style>
</head>
<body>

    <div id="d1">DIV #1</div>
    <div id="d2">DIV #2</div>
    <div id="d3">DIV #3</div>
    <div id="d4">DIV #4</div>

</body>
</html>
