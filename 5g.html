<!DOCTYPE html>
<html>
<head>
    <title>Color Blocks</title>
    <style>
        body {
            margin: 0px;
        }

        div {
            width: 250px;
            height: 100px;
            color: black;
            font-weight: bold;
            margin: 25px;
            padding: 5px;
            box-sizing: border-box;
        }

        #d1 {
            background-color: red;
            border: 5px solid black;
        }

        #d2 {
            background-color: green;
            border: 9px solid yellow;
        }

        #d3 {
            background-color: blue;
            border: 3px solid purple;
        }

        #d4 {
            background-color: purple;
            border: 5px inset silver;
        }
    </style>
</head>
<body>

    <div id="d1">DIV #1</div>
    <div id="d2">DIV #2</div>
    <div id="d3">DIV #3</div>
    <div id="d4">DIV #4</div>

</body>
</html>
